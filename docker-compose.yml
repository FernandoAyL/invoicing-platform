services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-invoicing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invoicing}
      POSTGRES_DB: ${POSTGRES_DB:-invoicing}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoicing} -d ${POSTGRES_DB:-invoicing}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-invoicing}:${POSTGRES_PASSWORD:-invoicing}@db:5432/${POSTGRES_DB:-invoicing}
      PORT: 8080
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-change-me}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-password123}
      SEED_MEMBER_PASSWORD: ${SEED_MEMBER_PASSWORD:-password123}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules

  web:
    build: .
    depends_on:
      - app
    environment:
      # The api service is named "app" in this compose file; from inside the
      # web container it's reachable at http://app:8080.
      API_PROXY_TARGET: http://app:8080
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
    command: pnpm --filter @invoicing/web dev

volumes:
  db-data:
