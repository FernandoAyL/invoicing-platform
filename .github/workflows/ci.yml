name: CI

on:
  push:
    branches: [main]
  pull_request:

# Needed by the test-reporter to publish a Check Run with the results.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - run: pnpm -r typecheck
      - run: docker build -t invoicing-platform-app .

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Run api unit tests (JUnit report)
        run: >-
          pnpm --filter @invoicing/api exec vitest run
          --reporter=default
          --reporter=junit
          --outputFile=test-report.junit.xml
      - name: Run web unit tests (JUnit report)
        if: ${{ !cancelled() }}
        run: >-
          pnpm --filter @invoicing/web exec vitest run
          --reporter=default
          --reporter=junit
          --outputFile=test-report.junit.xml
      - name: Publish test report
        uses: dorny/test-reporter@v1
        # Publish even when tests fail, so the failures are visible in the check.
        if: ${{ !cancelled() }}
        with:
          name: Unit Tests
          path: '**/test-report.junit.xml'
          reporter: java-junit
          fail-on-error: true
          use-actions-summary: 'true'
      - name: Upload JUnit report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: junit-report
          path: '**/test-report.junit.xml'
          if-no-files-found: warn
