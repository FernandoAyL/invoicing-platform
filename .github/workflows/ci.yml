name: CI

on:
  push:
    branches: [main]
  pull_request:

# Needed by the test-reporter to publish a Check Run with the results.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - run: pnpm -r typecheck
      - run: docker build -t invoicing-platform-app .

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Run api unit tests (JUnit report)
        run: >-
          pnpm --filter @invoicing/api exec vitest run
          --reporter=default
          --reporter=junit
          --outputFile=test-report.junit.xml
      - name: Run web unit tests (JUnit report)
        if: ${{ !cancelled() }}
        run: >-
          pnpm --filter @invoicing/web exec vitest run
          --reporter=default
          --reporter=junit
          --outputFile=test-report.junit.xml
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        # Publish even when a test step failed, so the failures are visible.
        if: ${{ !cancelled() }}
        with:
          # Creates/updates a check run with this name, holding the full report.
          check_name: Test Results
          files: '**/test-report.junit.xml'
          # Post (and keep updating) a PR comment with the pass/fail breakdown.
          comment_mode: always
          # Make the check fail (not neutral) when any test failed.
          action_fail: true
      - name: Upload JUnit report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: junit-report
          path: '**/test-report.junit.xml'
          if-no-files-found: warn
