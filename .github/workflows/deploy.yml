name: Deploy

# CD: on merge to main, build the app image, push it to Artifact Registry, run migrations as a
# one-off gate, roll the Cloud Run service, then release the web bundle to Firebase Hosting. The
# IaC layer owns all standing infrastructure (database, container registry, Cloud Run service/job,
# IAM) — this workflow only ever calls Artifact Registry/Cloud Run/Firebase APIs, nothing
# infra-provisioning. See docs/design-decisions.md#deploy-and-iac-boundary for the full ownership
# split.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys so two merges landing close together don't race each other's
# migrate/roll steps. Never cancel a deploy that's already rolling out.
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write # required to mint the Workload Identity Federation credential
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REGION: ${{ vars.GCP_REGION }}
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REPOSITORY: ${{ vars.AR_REPOSITORY }}
      SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      MIGRATE_JOB: ${{ vars.CLOUD_RUN_MIGRATE_JOB }}
    steps:
      - uses: actions/checkout@v4

      # No static keys: short-lived credentials via GitHub's OIDC token, trust-scoped (on the GCP
      # side) to this repo — see infra/bootstrap.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      # Idempotent (mirrors the old ECR skip-if-exists): a retried run (e.g. re-running after an
      # earlier step failed) reuses the same commit SHA tag — pushing it again would conflict.
      - name: Build and push image
        id: image
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/api:${GITHUB_SHA}"
          if gcloud artifacts docker images describe "$IMAGE" >/dev/null 2>&1; then
            echo "Image for $GITHUB_SHA already exists in Artifact Registry, skipping build/push."
          else
            docker build --target runner -t "$IMAGE" .
            docker push "$IMAGE"
          fi
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"

      # Migrations gate the deploy: point the job at the NEW image first, then run it and wait.
      # A non-zero exit here fails this step, which fails the job before the service is ever
      # rolled, so old code keeps serving traffic (same gate semantics as the old ECS migration
      # task). Runs the new image so the migration files that ship with this release are applied.
      - name: Run database migrations
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: |
          set -euo pipefail
          gcloud run jobs update "$MIGRATE_JOB" \
            --image "$IMAGE_URI" \
            --region "$REGION"
          gcloud run jobs execute "$MIGRATE_JOB" \
            --region "$REGION" \
            --wait

      # Only reached if migrations succeeded. Rolls the service to the new image and waits for a
      # healthy revision by default.
      - name: Deploy Cloud Run service
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: |
          set -euo pipefail
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE_URI" \
            --region "$REGION"

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build web bundle
        run: pnpm --filter @invoicing/web build

      - name: Deploy web bundle to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          npx --yes firebase-tools deploy \
            --only hosting \
            --project "$PROJECT_ID" \
            --non-interactive
